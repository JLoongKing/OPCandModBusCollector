<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>多协议数据采集平台</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
  <script src="https://unpkg.com/element-plus/dist/index.full.min.js"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #app { width: 100%; height: 100%; font-family: 'Microsoft YaHei', sans-serif; }
    .app-header { background: linear-gradient(135deg, #409EFF, #337ECC); color: white; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 56px; }
    .app-title { font-size: 20px; font-weight: bold; letter-spacing: 2px; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .page-header h2 { margin: 0; color: #303133; }
    .task-config { padding: 20px; max-width: 1080px; margin: 0 auto; }
    .task-dashboard { padding: 20px; }
    .stat-card { text-align: center; }
    .stat-label { font-size: 14px; color: #909399; margin-bottom: 8px; }
    .stat-value { font-size: 24px; font-weight: bold; color: #303133; }
    .card-header { display: flex; justify-content: space-between; align-items: center; }
    .chart-container { height: 400px; position: relative; }
    .chart-container canvas { width: 100% !important; height: 100% !important; }
    .el-main { padding: 20px; }
  </style>
</head>
<body>
  <div id="app">
    <el-container>
      <el-header class="app-header">
        <span class="app-title">多协议数据采集平台</span>
        <el-tag type="info" size="small">OPC UA / Modbus TCP / Kafka</el-tag>
      </el-header>
      <el-main>
        <router-view></router-view>
      </el-main>
    </el-container>
  </div>

  <script>
    const { createApp, ref, reactive, computed, onMounted, onUnmounted, nextTick } = Vue
    const { createRouter, createWebHashHistory } = VueRouter
    const API_BASE = 'http://localhost:8081/api'

    /* ========== TaskList Component ========== */
    const TaskList = {
      template: `
        <div>
          <div class="page-header">
            <h2>任务管理</h2>
            <el-button type="primary" @click="createTask">创建任务</el-button>
          </div>
          <el-table :data="tasks" border stripe v-loading="loading" empty-text="暂无任务，请点击创建任务">
            <el-table-column prop="id" label="ID" width="60" />
            <el-table-column prop="name" label="任务名称" min-width="150" />
            <el-table-column prop="description" label="描述" min-width="200" show-overflow-tooltip />
            <el-table-column label="协议类型" width="120">
              <template #default="{ row }">
                <el-tag :type="row.protocolType === 'OPC_UA' ? 'success' : 'warning'" size="small">
                  {{ row.protocolType === 'OPC_UA' ? 'OPC UA' : 'Modbus TCP' }}
                </el-tag>
              </template>
            </el-table-column>
            <el-table-column label="状态" width="100">
              <template #default="{ row }">
                <el-tag :type="row.status === 'RUNNING' ? 'success' : 'info'" size="small">
                  {{ row.status === 'RUNNING' ? '运行中' : '已停止' }}
                </el-tag>
              </template>
            </el-table-column>
            <el-table-column label="采集点数" width="80">
              <template #default="{ row }">{{ row.points ? row.points.length : 0 }}</template>
            </el-table-column>
            <el-table-column label="Kafka" width="80">
              <template #default="{ row }">
                <el-tag :type="row.kafkaEnabled ? 'success' : 'info'" size="small">
                  {{ row.kafkaEnabled ? '开启' : '关闭' }}
                </el-tag>
              </template>
            </el-table-column>
            <el-table-column prop="createdAt" label="创建时间" width="170" />
            <el-table-column label="操作" width="280" fixed="right">
              <template #default="{ row }">
                <el-button v-if="row.status !== 'RUNNING'" type="success" size="small" @click="startTask(row)">启动</el-button>
                <el-button v-else type="warning" size="small" @click="stopTask(row)">停止</el-button>
                <el-button type="primary" size="small" @click="viewDashboard(row)">数据</el-button>
                <el-button size="small" @click="editTask(row)">编辑</el-button>
                <el-button type="danger" size="small" @click="deleteTask(row)">删除</el-button>
              </template>
            </el-table-column>
          </el-table>
          <div style="margin-top:20px;text-align:right;">
            <el-pagination
              v-model:current-page="currentPage"
              v-model:page-size="pageSize"
              :page-sizes="[5,10,20,50]"
              :total="total"
              layout="total, sizes, prev, pager, next, jumper"
              @size-change="fetchTasks"
              @current-change="fetchTasks" />
          </div>
        </div>
      `,
      setup() {
        const router = VueRouter.useRouter()
        const tasks = ref([])
        const loading = ref(false)
        const currentPage = ref(1)
        const pageSize = ref(10)
        const total = ref(0)

        const fetchTasks = async () => {
          loading.value = true
          try {
            const res = await axios.get(API_BASE + '/tasks/page', {
              params: { page: currentPage.value - 1, size: pageSize.value }
            })
            if (res.data.success) {
              tasks.value = res.data.data
              total.value = res.data.total
            }
          } catch (e) {
            ElementPlus.ElMessage.error('获取任务列表失败')
          } finally {
            loading.value = false
          }
        }

        const createTask = () => router.push('/task/create')
        const editTask = (task) => router.push('/task/edit/' + task.id)
        const viewDashboard = (task) => router.push('/task/dashboard/' + task.id)

        const startTask = async (task) => {
          try {
            const res = await axios.post(API_BASE + '/tasks/' + task.id + '/start')
            if (res.data.success) { ElementPlus.ElMessage.success('任务已启动'); fetchTasks() }
            else ElementPlus.ElMessage.error(res.data.message || '启动失败')
          } catch (e) { ElementPlus.ElMessage.error('启动任务失败') }
        }

        const stopTask = async (task) => {
          try {
            const res = await axios.post(API_BASE + '/tasks/' + task.id + '/stop')
            if (res.data.success) { ElementPlus.ElMessage.success('任务已停止'); fetchTasks() }
            else ElementPlus.ElMessage.error(res.data.message || '停止失败')
          } catch (e) { ElementPlus.ElMessage.error('停止任务失败') }
        }

        const deleteTask = async (task) => {
          try {
            await ElementPlus.ElMessageBox.confirm('确定要删除任务 "' + task.name + '" 吗？此操作不可恢复。', '确认删除', { confirmButtonText: '确定', cancelButtonText: '取消', type: 'warning' })
            const res = await axios.delete(API_BASE + '/tasks/' + task.id)
            if (res.data.success) { ElementPlus.ElMessage.success('任务已删除'); fetchTasks() }
          } catch (e) {
            if (e !== 'cancel') ElementPlus.ElMessage.error('删除任务失败')
          }
        }

        onMounted(fetchTasks)
        return { tasks, loading, currentPage, pageSize, total, createTask, editTask, viewDashboard, startTask, stopTask, deleteTask }
      }
    }

    /* ========== TaskConfig Component ========== */
    const TaskConfig = {
      template: `
        <div class="task-config">
          <div class="page-header"><h2>{{ isEdit ? '编辑任务' : '创建任务' }}</h2></div>
          <el-form ref="formRef" :model="form" :rules="rules" label-width="140px" v-loading="loading">
            <el-divider content-position="left">基本信息</el-divider>
            <el-form-item label="任务名称" prop="name">
              <el-input v-model="form.name" placeholder="请输入任务名称" maxlength="100" />
            </el-form-item>
            <el-form-item label="任务描述" prop="description">
              <el-input v-model="form.description" type="textarea" :rows="2" placeholder="请输入任务描述" maxlength="500" />
            </el-form-item>
            <el-form-item label="协议类型" prop="protocolType">
              <el-radio-group v-model="form.protocolType" @change="onProtocolChange">
                <el-radio label="OPC_UA">OPC UA</el-radio>
                <el-radio label="MODBUS_TCP">Modbus TCP</el-radio>
              </el-radio-group>
            </el-form-item>

            <template v-if="form.protocolType === 'OPC_UA'">
              <el-divider content-position="left">OPC UA 配置</el-divider>
              <el-form-item label="服务器地址" prop="opcServerUrl">
                <el-input v-model="form.opcServerUrl" placeholder="opc.tcp://host:port" />
              </el-form-item>
              <el-form-item label="安全策略">
                <el-select v-model="form.opcSecurityPolicy" placeholder="请选择安全策略">
                  <el-option label="None" value="None" />
                  <el-option label="Basic128Rsa15" value="Basic128Rsa15" />
                  <el-option label="Basic256" value="Basic256" />
                  <el-option label="Basic256Sha256" value="Basic256Sha256" />
                </el-select>
              </el-form-item>
              <el-form-item label="安全模式">
                <el-select v-model="form.opcSecurityMode" placeholder="请选择安全模式">
                  <el-option label="None" value="None" />
                  <el-option label="Sign" value="Sign" />
                  <el-option label="SignAndEncrypt" value="SignAndEncrypt" />
                </el-select>
              </el-form-item>
              <el-form-item label="用户名"><el-input v-model="form.opcUsername" placeholder="匿名认证可不填" /></el-form-item>
              <el-form-item label="密码"><el-input v-model="form.opcPassword" type="password" placeholder="匿名认证可不填" show-password /></el-form-item>
              <el-form-item label="Namespace">
                <el-input v-model="form.opcNamespace" placeholder="2" />
              </el-form-item>
              <el-form-item label="会话超时(ms)">
                <el-input-number v-model="form.opcSessionTimeout" :min="1000" :max="120000" :step="1000" />
              </el-form-item>
              <el-form-item label="采集周期(ms)">
                <el-input-number v-model="form.opcScanInterval" :min="100" :max="600000" :step="100" />
              </el-form-item>
            </template>

            <template v-if="form.protocolType === 'MODBUS_TCP'">
              <el-divider content-position="left">Modbus TCP 配置</el-divider>
              <el-form-item label="主机地址" prop="modbusHost">
                <el-input v-model="form.modbusHost" placeholder="192.168.1.100" />
              </el-form-item>
              <el-form-item label="端口号" prop="modbusPort">
                <el-input-number v-model="form.modbusPort" :min="1" :max="65535" />
              </el-form-item>
              <el-form-item label="超时时间(ms)">
                <el-input-number v-model="form.modbusTimeout" :min="100" :max="30000" :step="100" />
              </el-form-item>
              <el-form-item label="扫描间隔(ms)">
                <el-input-number v-model="form.modbusScanInterval" :min="100" :max="60000" :step="100" />
              </el-form-item>
            </template>

            <el-divider content-position="left">采集点位配置</el-divider>
            <el-form-item label="采集点位">
              <div style="display: flex; gap: 8px; margin-bottom: 10px;">
                <el-button type="primary" size="small" icon="el-icon-plus" @click="addPoint">添加点位</el-button>
                <el-button type="success" size="small" icon="el-icon-download" @click="downloadTemplate">下载模板</el-button>
                <el-upload
                  :auto-upload="false"
                  :show-file-list="false"
                  :on-change="handleFileChange"
                  accept=".xlsx,.xls"
                  style="display:inline-block">
                  <el-button type="warning" size="small" icon="el-icon-upload2">导入Excel</el-button>
                </el-upload>
              </div>
              <el-table :data="form.points" border stripe style="margin-top:10px" empty-text="暂无点位，请添加">
                <el-table-column type="index" label="#" width="50" />
                <el-table-column label="点位名称" min-width="120">
                  <template #default="{ row }"><el-input v-model="row.name" placeholder="如：温度" size="small" /></template>
                </el-table-column>
                <el-table-column label="地址" min-width="180">
                    <template #default="{ row }">
                        <el-input
                            v-model="row.address"
                            :placeholder="form.protocolType === 'MODBUS_TCP' ? '如：1;100 (从站;寄存器)' : '如：ns=2;s=Temperature'"
                            size="small"
                        />
                    </template>
                </el-table-column>
                <el-table-column label="设备ID" min-width="150">
                  <template #default="{ row }"><el-input v-model="row.devId" placeholder="设备唯一标识" size="small" /></template>
                </el-table-column>
                <el-table-column label="点位ID" min-width="150">
                  <template #default="{ row }"><el-input v-model="row.nodeId" placeholder="点位唯一标识" size="small" /></template>
                </el-table-column>
                <el-table-column label="比例系数" width="120">
                  <template #default="{ row }"><el-input-number v-model="row.scaleFactor" :min="0.0001" :max="10000" :step="0.0001" size="small" /></template>
                </el-table-column>
                <el-table-column label="操作" width="80">
                  <template #default="{ $index }"><el-button type="danger" size="small" icon="el-icon-delete" @click="removePoint($index)">删除</el-button></template>
                </el-table-column>
              </el-table>
              <el-alert 
                title="导入说明" 
                type="info" 
                style="margin-top: 15px;" 
                :closable="false" 
                show-icon>
                <ul style="margin: 0; padding-left: 20px; color: #606266;">
                  <li>Excel格式：第1列=点位名称，第2列=地址，第3列=设备ID，第4列=点位ID，第5列=比例系数（可选，默认1.0）</li>
                  <li v-if="form.protocolType === 'MODBUS_TCP'">
                    Modbus地址格式：<strong>从站;寄存器</strong> (例如：<strong>1;100</strong>)
                    <ul style="padding-left: 20px; margin-top: 5px;">
                      <li>纯数字地址（1-9999）：直接使用寄存器地址（默认FC3）</li>
                      <li>3xxxx范围（30001-39999）：输入寄存器（FC4）</li>
                      <li>4xxxx范围（40001-49999）：保持寄存器（FC3）</li>
                    </ul>
                  </li>
                  <li v-else>OPC UA地址格式：ns=命名空间;s=节点ID (例如：ns=2;s=Temperature)</li>
                  <li>导入前请先选择协议类型，下载对应模板</li>
                </ul>
              </el-alert>
            </el-form-item>

            <el-divider content-position="left">Kafka 配置</el-divider>
            <el-form-item label="启用Kafka"><el-switch v-model="form.kafkaEnabled" /></el-form-item>
            <template v-if="form.kafkaEnabled">
              <el-form-item label="Bootstrap Servers" prop="kafkaBootstrapServers">
                <el-input v-model="form.kafkaBootstrapServers" placeholder="localhost:9092" />
              </el-form-item>
              <el-form-item label="Topic" prop="kafkaTopic">
                <el-input v-model="form.kafkaTopic" placeholder="请输入Topic名称" />
              </el-form-item>
              <el-form-item label="Acks">
                <el-select v-model="form.kafkaAcks" placeholder="请选择">
                  <el-option label="0 (不等待确认)" value="0" />
                  <el-option label="1 (Leader确认)" value="1" />
                  <el-option label="all (全部确认)" value="all" />
                </el-select>
              </el-form-item>
              <el-form-item label="重试次数"><el-input-number v-model="form.kafkaRetries" :min="0" :max="10" /></el-form-item>
              <el-form-item label="批量大小(bytes)"><el-input-number v-model="form.kafkaBatchSize" :min="1024" :max="1048576" :step="1024" /></el-form-item>
              <el-form-item label="延迟时间(ms)"><el-input-number v-model="form.kafkaLingerMs" :min="0" :max="1000" :step="10" /></el-form-item>
              <el-form-item label="缓冲区内存(bytes)"><el-input-number v-model="form.kafkaBufferMemory" :min="1048576" :max="134217728" :step="1048576" /></el-form-item>
            </template>

            <el-form-item>
              <el-button type="primary" @click="submitForm" :loading="submitting">保存任务</el-button>
              <el-button @click="goBack">取消</el-button>
            </el-form-item>
          </el-form>
        </div>
      `,
      setup() {
        const route = VueRouter.useRoute()
        const router = VueRouter.useRouter()
        const formRef = ref(null)
        const loading = ref(false)
        const submitting = ref(false)
        const isEdit = ref(false)

        const form = reactive({
          name: '', description: '', protocolType: 'OPC_UA',
          opcServerUrl: 'opc.tcp://localhost:7718', opcSecurityPolicy: 'None', opcSecurityMode: 'None',
          opcUsername: '', opcPassword: '', opcSessionTimeout: 5000, opcScanInterval: 1000, opcNamespace: '2',
          modbusHost: '127.0.0.1', modbusPort: 502, modbusTimeout: 3000, modbusScanInterval: 1000,
          kafkaEnabled: false, kafkaBootstrapServers: 'localhost:9092', kafkaTopic: '',
          kafkaAcks: '1', kafkaRetries: 3, kafkaBatchSize: 16384, kafkaLingerMs: 0, kafkaBufferMemory: 33554432,
          points: []
        })

        const rules = {
          name: [{ required: true, message: '请输入任务名称', trigger: 'blur' }],
          protocolType: [{ required: true, message: '请选择协议类型', trigger: 'change' }]
        }

        const onProtocolChange = () => {}

        const addPoint = () => {
          form.points.push({ name: '', address: '', devId: '', nodeId: '', scaleFactor: 1.0, sortOrder: form.points.length + 1 })
        }

        const removePoint = (index) => { form.points.splice(index, 1) }

        const downloadTemplate = async () => {
          try {
            let protocol = form.protocolType || 'OPC_UA'
            // 转换为后端期望的协议名称
            if (protocol === 'MODBUS_TCP') {
              protocol = 'MODBUS'
            }
            const res = await axios.get(API_BASE + '/tasks/template?protocol=' + protocol, {
              responseType: 'blob'
            })
            const url = window.URL.createObjectURL(new Blob([res.data]))
            const link = document.createElement('a')
            link.href = url
            link.setAttribute('download', protocol + '_点位导入模板.xlsx')
            document.body.appendChild(link)
            link.click()
            document.body.removeChild(link)
          } catch (e) {
            ElementPlus.ElMessage.error('下载模板失败')
          }
        }

        const handleFileChange = async (file) => {
          try {
            const reader = new FileReader()
            reader.onload = (e) => {
              try {
                const data = new Uint8Array(e.target.result)
                const workbook = XLSX.read(data, { type: 'array' })
                const sheetName = workbook.SheetNames[0]
                const sheet = workbook.Sheets[sheetName]
                const jsonData = XLSX.utils.sheet_to_json(sheet, { header: 1 })

                if (jsonData.length < 2) {
                  ElementPlus.ElMessage.warning('Excel文件为空或格式不正确')
                  return
                }

                const importedPoints = []
                for (let i = 1; i < jsonData.length; i++) {
                  const row = jsonData[i]
                  if (row.length >= 2 && row[0] && row[1]) {
                    importedPoints.push({
                      name: String(row[0] || '').trim(),
                      address: String(row[1] || '').trim(),
                      devId: row[2] ? String(row[2]).trim() : '',
                      nodeId: row[3] ? String(row[3]).trim() : '',
                      scaleFactor: row[4] ? parseFloat(row[4]) : 1.0,
                      sortOrder: form.points.length + importedPoints.length + 1
                    })
                  }
                }

                if (importedPoints.length === 0) {
                  ElementPlus.ElMessage.warning('未找到有效的点位数据')
                  return
                }

                form.points = [...form.points, ...importedPoints]
                ElementPlus.ElMessage.success('成功导入 ' + importedPoints.length + ' 个点位')
              } catch (parseError) {
                console.error('解析Excel失败:', parseError)
                ElementPlus.ElMessage.error('解析Excel文件失败')
              }
            }
            reader.readAsArrayBuffer(file.raw)
          } catch (e) {
            console.error('导入点位失败:', e)
            ElementPlus.ElMessage.error('导入点位失败')
          }
        }

        const submitForm = async () => {
          if (!formRef.value) return
          try { await formRef.value.validate() } catch { ElementPlus.ElMessage.warning('请完善必填项'); return }

          submitting.value = true
          try {
            const data = { ...form }
            data.points = form.points.map((p, i) => ({ ...p, sortOrder: i + 1 }))
            let res
            if (isEdit.value) {
              res = await axios.put(API_BASE + '/tasks/' + route.params.id, data)
            } else {
              res = await axios.post(API_BASE + '/tasks', data)
            }
            if (res.data.success) {
              ElementPlus.ElMessage.success(isEdit.value ? '任务更新成功' : '任务创建成功')
              router.push('/')
            } else {
              ElementPlus.ElMessage.error(res.data.message || '保存失败')
            }
          } catch (e) { ElementPlus.ElMessage.error('保存任务失败') }
          finally { submitting.value = false }
        }

        const goBack = () => router.push('/')

        const loadTask = async () => {
          const id = route.params.id
          console.log('loadTask called with id:', id)
          if (!id) return
          isEdit.value = true
          loading.value = true
          try {
            const res = await axios.get(API_BASE + '/tasks/' + id)
            console.log('API response:', res.data)
            if (res.data.success) {
              const task = res.data.data
              // 回显基本信息
              if (task.name !== undefined && task.name !== null) form.name = task.name
              if (task.description !== undefined && task.description !== null) form.description = task.description
              if (task.protocolType !== undefined && task.protocolType !== null) form.protocolType = task.protocolType
              
              // 回显OPC UA配置
              if (task.opcServerUrl !== undefined && task.opcServerUrl !== null) form.opcServerUrl = task.opcServerUrl
              if (task.opcSecurityPolicy !== undefined && task.opcSecurityPolicy !== null) form.opcSecurityPolicy = task.opcSecurityPolicy
              if (task.opcSecurityMode !== undefined && task.opcSecurityMode !== null) form.opcSecurityMode = task.opcSecurityMode
              if (task.opcUsername !== undefined && task.opcUsername !== null) form.opcUsername = task.opcUsername
              if (task.opcPassword !== undefined && task.opcPassword !== null) form.opcPassword = task.opcPassword
              if (task.opcSessionTimeout !== undefined && task.opcSessionTimeout !== null) form.opcSessionTimeout = task.opcSessionTimeout
              if (task.opcScanInterval !== undefined && task.opcScanInterval !== null) form.opcScanInterval = task.opcScanInterval
              if (task.opcNamespace !== undefined && task.opcNamespace !== null) form.opcNamespace = task.opcNamespace
              
              // 回显Modbus配置
              if (task.modbusHost !== undefined && task.modbusHost !== null) form.modbusHost = task.modbusHost
              if (task.modbusPort !== undefined && task.modbusPort !== null) form.modbusPort = task.modbusPort
              if (task.modbusTimeout !== undefined && task.modbusTimeout !== null) form.modbusTimeout = task.modbusTimeout
              if (task.modbusScanInterval !== undefined && task.modbusScanInterval !== null) form.modbusScanInterval = task.modbusScanInterval
              
              // 回显Kafka配置
              if (task.kafkaEnabled !== undefined && task.kafkaEnabled !== null) form.kafkaEnabled = task.kafkaEnabled
              if (task.kafkaBootstrapServers !== undefined && task.kafkaBootstrapServers !== null) form.kafkaBootstrapServers = task.kafkaBootstrapServers
              if (task.kafkaTopic !== undefined && task.kafkaTopic !== null) form.kafkaTopic = task.kafkaTopic
              if (task.kafkaAcks !== undefined && task.kafkaAcks !== null) form.kafkaAcks = task.kafkaAcks
              if (task.kafkaRetries !== undefined && task.kafkaRetries !== null) form.kafkaRetries = task.kafkaRetries
              if (task.kafkaBatchSize !== undefined && task.kafkaBatchSize !== null) form.kafkaBatchSize = task.kafkaBatchSize
              if (task.kafkaLingerMs !== undefined && task.kafkaLingerMs !== null) form.kafkaLingerMs = task.kafkaLingerMs
              if (task.kafkaBufferMemory !== undefined && task.kafkaBufferMemory !== null) form.kafkaBufferMemory = task.kafkaBufferMemory
              
              // 回显点位
              if (task.points && task.points.length > 0) {
                form.points = task.points.map(p => ({
                  name: p.name,
                  address: p.address,
                  devId: p.devId || '',
                  nodeId: p.nodeId || '',
                  scaleFactor: p.scaleFactor !== undefined ? p.scaleFactor : 1.0,
                  sortOrder: p.sortOrder
                }))
              }
              console.log('Form after loading:', form)
            }
          } catch (e) { 
            console.error('Error loading task:', e)
            ElementPlus.ElMessage.error('加载任务信息失败') 
          }
          finally { loading.value = false }
        }

        onMounted(loadTask)
        return { formRef, form, rules, loading, submitting, isEdit, onProtocolChange, addPoint, removePoint, downloadTemplate, handleFileChange, submitForm, goBack }
      }
    }

    /* ========== TaskDashboard Component ========== */
    const TaskDashboard = {
      template: `
        <div class="task-dashboard">
          <div class="page-header">
            <h2>数据看板 - {{ taskName }}</h2>
            <div>
              <el-tag :type="taskStatus === 'RUNNING' ? 'success' : 'info'" size="large">
                {{ taskStatus === 'RUNNING' ? '运行中' : '已停止' }}
              </el-tag>
              <el-button style="margin-left:10px" @click="goBack">返回任务列表</el-button>
            </div>
          </div>

          <el-row :gutter="20" style="margin-bottom:20px">
            <el-col :span="6" v-for="stat in stats" :key="stat.label">
              <el-card shadow="hover">
                <div class="stat-card">
                  <div class="stat-label">{{ stat.label }}</div>
                  <div class="stat-value">{{ stat.value }}</div>
                </div>
              </el-card>
            </el-col>
          </el-row>

          <el-card>
            <template #header>
              <div class="card-header">
                <span>实时数据趋势</span>
                <el-button size="small" @click="refreshChart">刷新</el-button>
              </div>
            </template>
            <div class="chart-container"><canvas ref="chartCanvas"></canvas></div>
          </el-card>

          <el-card style="margin-top:20px">
            <template #header><span>最新数据</span></template>
            <el-table :data="latestData" border stripe empty-text="暂无数据">
              <el-table-column prop="pointName" label="点位名称" width="150" />
              <el-table-column prop="address" label="地址" min-width="200" />
              <el-table-column prop="value" label="数值" width="150" />
              <el-table-column prop="dataType" label="数据类型" width="100" />
              <el-table-column prop="timestamp" label="采集时间" width="180" />
            </el-table>
          </el-card>
        </div>
      `,
      setup() {
        const route = VueRouter.useRoute()
        const router = VueRouter.useRouter()
        const taskId = route.params.id
        const taskName = ref('')
        const taskStatus = ref('')
        const chartCanvas = ref(null)
        const latestData = ref([])
        const stats = ref([
          { label: '采集点数', value: '0' },
          { label: '数据总量', value: '0' },
          { label: '最新采集', value: '-' },
          { label: '采集状态', value: '未知' }
        ])

        let chartInstance = null
        let refreshTimer = null

        const loadTaskInfo = async () => {
          try {
            const res = await axios.get(API_BASE + '/tasks/' + taskId)
            if (res.data.success) {
              const task = res.data.data
              taskName.value = task.name
              taskStatus.value = task.status
              stats.value[0].value = task.points ? task.points.length : 0
              stats.value[3].value = task.status === 'RUNNING' ? '正常采集' : '已停止'
            }
          } catch (e) { console.error('加载任务信息失败', e) }
        }

        const loadChartData = async () => {
          try {
            const res = await axios.get(API_BASE + '/tasks/' + taskId + '/data/chart', { params: { seconds: 120 } })
            if (res.data.success && res.data.data) renderChart(res.data.data)
          } catch (e) { console.error('加载图表数据失败', e) }
        }

        const loadLatestData = async () => {
          try {
            const res = await axios.get(API_BASE + '/tasks/' + taskId + '/data')
            if (res.data.success && res.data.data) {
              latestData.value = res.data.data.slice(0, 20)
              stats.value[1].value = res.data.data.length
              if (res.data.data.length > 0) stats.value[2].value = res.data.data[0].timestamp
            }
          } catch (e) { console.error('加载最新数据失败', e) }
        }

        const renderChart = (chartData) => {
          if (!chartCanvas.value) return
          const ctx = chartCanvas.value.getContext('2d')
          if (chartInstance) chartInstance.destroy()

          const labels = chartData.labels || []
          const datasets = []
          if (chartData.series) {
            const colors = ['#409EFF', '#67C23A', '#E6A23C', '#F56C6C', '#909399', '#B37FEB', '#5CDBD3', '#FF85C0']
            chartData.series.forEach((series, index) => {
              datasets.push({
                label: series.name, data: series.data,
                borderColor: colors[index % colors.length], backgroundColor: 'transparent',
                borderWidth: 2, pointRadius: 1, tension: 0.3
              })
            })
          }

          chartInstance = new Chart(ctx, {
            type: 'line',
            data: { labels, datasets },
            options: {
              responsive: true, maintainAspectRatio: false, animation: { duration: 300 },
              scales: {
                x: { display: true, title: { display: true, text: '时间' }, ticks: { maxTicksLimit: 20 } },
                y: { display: true, title: { display: true, text: '数值' } }
              },
              plugins: { legend: { position: 'top' } }
            }
          })
        }

        const refreshChart = () => { loadChartData(); loadLatestData(); loadTaskInfo() }
        const goBack = () => router.push('/')

        onMounted(async () => {
          await loadTaskInfo()
          await nextTick()
          await loadChartData()
          await loadLatestData()
          refreshTimer = setInterval(refreshChart, 5000)
        })

        onUnmounted(() => {
          if (refreshTimer) clearInterval(refreshTimer)
          if (chartInstance) chartInstance.destroy()
        })

        return { taskName, taskStatus, chartCanvas, latestData, stats, refreshChart, goBack }
      }
    }

    /* ========== Router ========== */
    const routes = [
      { path: '/', component: TaskList },
      { path: '/task/create', component: TaskConfig },
      { path: '/task/edit/:id', component: TaskConfig },
      { path: '/task/dashboard/:id', component: TaskDashboard }
    ]

    const router = createRouter({ history: createWebHashHistory(), routes })

    /* ========== App ========== */
    const app = createApp({})
    app.use(ElementPlus)
    app.use(router)
    app.mount('#app')
  </script>
</body>
</html>
